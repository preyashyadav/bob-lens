<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bob Lens Sandbox - React</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
    }
    #root {
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // Test inputs will be injected here
    const testInputs = {{TEST_INPUTS}};
    
    // User code will be injected here
    {{USER_CODE}}
    
    // Render the component
    if (typeof App !== 'undefined') {
      ReactDOM.render(<App {...testInputs} />, document.getElementById('root'));
    } else {
      document.getElementById('root').innerHTML = '<p>No App component found</p>';
    }
  </script>
</body>
</html>
